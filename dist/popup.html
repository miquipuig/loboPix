<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lobopix</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main id="popupRoot" class="popup gallery-only-mode gallery-tab-active">
      <div id="popupScroll" class="popup-scroll hidden" aria-hidden="true"></div>

      <section
        id="logoLibraryOverlay"
        class="logo-library-overlay"
        aria-label="Galeria"
        aria-hidden="false"
      >
        <div class="logo-library-dialog">
          <header class="logo-library-header">
            <button id="logoLibraryCloseBtn" class="logo-library-close-btn btn btn-outline-secondary btn-sm" type="button" aria-label="Tancar galeria">
              <span id="logoLibraryCloseIcon" aria-hidden="true"><i class="bi bi-x-lg" aria-hidden="true"></i></span>
            </button>
            <h2 class="logo-library-title">
              <span id="logoLibraryTitleIcon" class="logo-library-title-icon" aria-hidden="true"><i class="bi bi-globe2" aria-hidden="true"></i></span>
              <span id="logoLibraryTitleText">Imatges web</span>
            </h2>
          </header>
          <div class="logo-library-actions">
            <button id="logoUploadBtn" class="btn btn-primary btn-sm" type="button" aria-label="Pujar imatges manuals">
              <span id="logoUploadBtnIcon" class="logo-library-action-icon" aria-hidden="true"><i class="bi bi-upload" aria-hidden="true"></i></span>
              <span>Pujar</span>
            </button>
            <button id="logoUsePageBtn" class="btn btn-outline-secondary btn-sm" type="button" aria-label="Canviar vista">
              <span id="logoUsePageBtnIcon" class="logo-library-action-icon" aria-hidden="true"><i class="bi bi-images" aria-hidden="true"></i></span>
              <span id="logoUsePageBtnText">Veure llistes d'imatges</span>
            </button>
            <div class="logo-library-layout-slider-wrap" role="group" aria-label="Tamano de miniaturas">
              <span class="logo-library-layout-edge-icon" aria-hidden="true" title="Miniatura gran">
                <i class="bi bi-square-fill" aria-hidden="true"></i>
              </span>
              <input
                id="thumbColsSlider"
                class="logo-library-layout-slider"
                type="range"
                min="1"
                max="4"
                step="1"
                value="4"
                list="thumbColsSliderMarks"
                aria-label="Columnas por fila"
              />
              <span class="logo-library-layout-edge-icon" aria-hidden="true" title="Miniatura petita">
                <i class="bi bi-grid-3x3-gap-fill" aria-hidden="true"></i>
              </span>
              <div class="logo-library-layout-slider-dots" aria-hidden="true">
                <span class="logo-library-layout-slider-dot"></span>
                <span class="logo-library-layout-slider-dot"></span>
                <span class="logo-library-layout-slider-dot"></span>
                <span class="logo-library-layout-slider-dot"></span>
              </div>
              <datalist id="thumbColsSliderMarks">
                <option value="1"></option>
                <option value="2"></option>
                <option value="3"></option>
                <option value="4"></option>
              </datalist>
            </div>
            <input id="logoUploadInput" class="hidden" type="file" multiple accept="image/png,image/jpeg,image/webp,image/gif,image/svg+xml,image/avif,image/bmp,image/x-icon" />
          </div>
          <div id="logoLibraryDropHint" class="logo-library-drop-hint hidden" aria-hidden="true">
            <div class="logo-library-drop-hint-box">Arrossega imatges aqui</div>
          </div>
          <div id="logoLibraryGrid" class="logo-library-grid" role="listbox" aria-label="Imatges"></div>
        </div>
      </section>

      <section id="userPage" class="standalone-page hidden" aria-label="Usuari">
        <header class="standalone-page-header">
          <h2 class="standalone-page-title">Usuari</h2>
          <p class="standalone-page-subtitle">Seccio en construccio.</p>
        </header>
        <div class="about-card card border-0 shadow-sm p-3">
          <p class="about-copy">Aquesta seccio encara no te funcionalitat activa.</p>
        </div>
      </section>

      <section id="aboutPage" class="standalone-page hidden" aria-label="About Us">
        <header class="standalone-page-header">
          <h2 class="standalone-page-title">About Us</h2>
          <p class="standalone-page-subtitle">Sobre l'aplicacio</p>
        </header>
        <div class="about-card card border-0 shadow-sm p-3">
          <div class="about-app-icon-wrap">
            <img class="about-app-icon" src="assets/lobopix.png" alt="lobopix" />
          </div>
          <p id="aboutVersion" class="about-app-version" aria-label="Versio"></p>
          <p class="about-copy">lobopix centra l'extensio en galeria d'imatges web i biblioteca manual.</p>
          <div class="about-signature">
            <p id="aboutSignatureTitle" class="about-signature-title">una aplicacio de</p>
            <a class="about-signature-link" href="https://loboware.com" target="_blank" rel="noopener noreferrer" aria-label="Loboware">
              <img class="about-signature-logo" src="assets/loboware.png" alt="Loboware" />
            </a>
          </div>
        </div>
      </section>

      <button id="saveGalleryFabBtn" class="save-gallery-fab hidden" type="button" aria-label="Guardar en la galeria">
        Guardar en la galeria
      </button>

      <nav id="bottomNav" class="bottom-nav" aria-label="Navegacio principal">
        <button id="pageUrlBtn" class="bottom-nav-btn active" type="button" data-page="url" aria-label="Galeria" title="Galeria" aria-pressed="true">
          <i class="bi bi-images" aria-hidden="true"></i>
        </button>
        <button id="pageUserBtn" class="bottom-nav-btn" type="button" data-page="user" aria-label="Usuari" title="Usuari" aria-pressed="false">
          <i class="bi bi-person-circle" aria-hidden="true"></i>
        </button>
        <button id="pageAboutBtn" class="bottom-nav-btn" type="button" data-page="about" aria-label="About" title="About" aria-pressed="false">
          <i class="bi bi-info-circle" aria-hidden="true"></i>
        </button>
      </nav>

      <div id="feedbackToast" class="popup-toast" role="status" aria-live="polite" aria-hidden="true">
        <span id="feedbackToastIcon" class="popup-toast-icon" aria-hidden="true"><i class="bi bi-check-circle-fill" aria-hidden="true"></i></span>
        <span id="feedbackToastText" class="popup-toast-text"></span>
      </div>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
